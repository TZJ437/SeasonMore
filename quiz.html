<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>互动测试 | 四时中国</title>
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/quiz.css">
  <link rel="stylesheet" href="./css/unified.css">
</head>
<body data-page="quiz">
  <div id="appHeader"></div>
  <main>
    <section class="page-hero">
      <div class="hero-copy">
        <p class="eyebrow">Quiz</p>
        <h1>互动测试</h1>
        <p class="lead">用几道题快速检查你是否理解四季、节气和干支之间的关系。</p>
      </div>
    </section>
    <section class="content-section quiz-intro">
      <div class="section-heading">
        <p class="eyebrow">Play Route</p>
        <h2>从轻测试到小游戏</h2>
        <p>先用问答校准概念，再用拼图、诗句、配对、排序和翻牌把记忆变得更稳。每个小游戏都是一小段，不需要一次玩完。</p>
      </div>
    </section>
    <section class="content-section quiz-box" id="quizBox"></section>
  </main>
  <div id="appFooter"></div>
  <script src="./js/data.js"></script>
  <script src="./js/common.js"></script>
  <script src="./js/quiz.js"></script>
</body>
</html>
